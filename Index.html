<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diffy — AI 文件差異審查</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/turndown@7.2.0/dist/turndown.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/turndown-plugin-gfm@1.0.2/dist/turndown-plugin-gfm.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #f8f7f5; }

        /* Markdown report styles */
        .prose h1 { font-size: 1.35rem; font-weight: 700; margin: 1.25rem 0 0.6rem; color: #1c1917; border-bottom: 2px solid #f0ede8; padding-bottom: 0.4rem; }
        .prose h2 { font-size: 1.1rem; font-weight: 600; margin: 1.1rem 0 0.5rem; color: #292524; }
        .prose h3 { font-size: 0.975rem; font-weight: 600; margin: 0.9rem 0 0.4rem; color: #44403c; }
        .prose p { margin: 0.55rem 0; line-height: 1.75; color: #44403c; }
        .prose ul { list-style: disc; padding-left: 1.5rem; margin: 0.6rem 0; }
        .prose ol { list-style: decimal; padding-left: 1.5rem; margin: 0.6rem 0; }
        .prose li { margin: 0.3rem 0; line-height: 1.65; color: #44403c; }
        .prose strong { font-weight: 600; color: #1c1917; }
        .prose em { font-style: italic; color: #57534e; }
        .prose code { background: #f0ede8; color: #c2410c; padding: 0.15rem 0.35rem; border-radius: 4px; font-size: 0.83em; font-family: 'SF Mono', 'Cascadia Code', monospace; }
        .prose pre { background: #1c1917; color: #e7e5e4; padding: 1rem 1.25rem; border-radius: 10px; overflow-x: auto; margin: 0.75rem 0; }
        .prose pre code { background: none; color: inherit; padding: 0; }
        .prose blockquote { border-left: 3px solid #d97706; padding: 0.25rem 0 0.25rem 1rem; color: #78716c; margin: 0.75rem 0; background: #fef9f0; border-radius: 0 6px 6px 0; }
        .prose table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.875rem; }
        .prose th { background: #f8f7f5; font-weight: 600; color: #292524; border: 1px solid #e7e5e4; padding: 0.5rem 0.75rem; text-align: left; }
        .prose td { border: 1px solid #e7e5e4; padding: 0.45rem 0.75rem; }
        .prose tr:nth-child(even) td { background: #faf9f7; }
        .prose hr { border: none; border-top: 1px solid #e7e5e4; margin: 1.25rem 0; }
        .prose a { color: #d97706; text-decoration: underline; }

        /* Drag-over state */
        .drag-active { background: #fffbeb !important; border-color: #d97706 !important; }

        /* Spin animation */
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 0.8s linear infinite; }

        /* Toast transition */
        #toast { transition: opacity 0.3s ease; }

        /* Print styles */
        @media print {
            nav, .no-print { display: none !important; }
            body { background: white; }
            .prose { color: #000; }
        }

        /* Subtle card hover */
        .upload-card { transition: border-color 0.15s, background 0.15s; }
        .upload-card:hover { border-color: #d97706 !important; background: #fffbeb !important; }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="bg-stone-900 text-white px-6 py-4 shadow-md flex items-center justify-between sticky top-0 z-40 no-print">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-amber-600 rounded-xl flex items-center justify-center flex-shrink-0">
                <i data-lucide="git-compare-arrows" class="w-5 h-5"></i>
            </div>
            <div>
                <h1 class="text-base font-semibold tracking-tight leading-tight">Diffy</h1>
                <p class="text-xs text-stone-400 leading-tight">AI 文件差異審查工具</p>
            </div>
        </div>
        <div class="hidden md:flex items-center gap-1.5 text-xs text-stone-500 bg-stone-800 px-3 py-1.5 rounded-full">
            <i data-lucide="files" class="w-3.5 h-3.5"></i>
            <span>Excel · PDF · Word · 圖片 · 合同</span>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8 md:px-6 space-y-5">

        <!-- AI Model & API Key -->
        <div class="bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-stone-100 flex items-center gap-2.5">
                <div class="w-7 h-7 bg-amber-50 rounded-lg flex items-center justify-center">
                    <i data-lucide="cpu" class="w-4 h-4 text-amber-600"></i>
                </div>
                <h2 class="font-semibold text-stone-800 text-sm">AI 模型設置</h2>
            </div>
            <div class="p-6 space-y-5">

                <!-- Model Selector -->
                <div>
                    <label class="block text-xs font-medium text-stone-500 uppercase tracking-wider mb-2.5">選擇模型</label>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="selectModel('gemini')" id="btn-gemini"
                            class="model-btn flex items-center gap-2 px-4 py-2.5 rounded-xl border-2 text-sm font-medium transition-all border-amber-400 bg-amber-50 text-amber-700 shadow-sm">
                            <i data-lucide="zap" class="w-3.5 h-3.5"></i>
                            Gemini 2.5 Flash
                        </button>
                        <button onclick="selectModel('zhipu')" id="btn-zhipu"
                            class="model-btn flex items-center gap-2 px-4 py-2.5 rounded-xl border-2 text-sm font-medium transition-all border-stone-200 bg-white text-stone-500 hover:border-stone-300 hover:text-stone-700">
                            <i data-lucide="sparkles" class="w-3.5 h-3.5"></i>
                            GLM-4-Flash <span class="text-xs font-normal text-stone-400 ml-0.5">(智譜)</span>
                        </button>
                    </div>
                    <p id="model-note" class="mt-2 text-xs text-stone-400 flex items-center gap-1.5">
                        <i data-lucide="info" class="w-3 h-3"></i>
                        <span id="model-note-text"></span>
                    </p>
                </div>

                <!-- API Key -->
                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label class="text-xs font-medium text-stone-500 uppercase tracking-wider">
                            <span id="api-key-label">Gemini API Key</span>
                        </label>
                        <span id="key-status" class="text-xs text-stone-400"></span>
                    </div>
                    <div class="flex gap-2">
                        <div class="relative flex-1">
                            <input type="password" id="api-key"
                                class="w-full pl-3.5 pr-10 py-2.5 border border-stone-200 rounded-xl text-sm font-mono bg-stone-50 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent focus:bg-white transition-all"
                                placeholder="貼上 API Key…">
                            <button onclick="toggleKeyVisibility()"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-stone-400 hover:text-stone-600 transition-colors">
                                <i data-lucide="eye" id="eye-icon" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <button onclick="saveApiKey()"
                            class="px-4 py-2.5 bg-amber-600 hover:bg-amber-700 active:bg-amber-800 text-white rounded-xl text-sm font-medium transition-colors flex items-center gap-1.5 flex-shrink-0 shadow-sm">
                            <i data-lucide="save" class="w-3.5 h-3.5"></i>
                            儲存
                        </button>
                    </div>
                    <p class="mt-1.5 text-xs text-stone-400">API Key 僅儲存於本地瀏覽器，不會上傳至任何伺服器</p>
                </div>

            </div>
        </div>

        <!-- File Upload -->
        <div class="bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-stone-100 flex items-center gap-2.5">
                <div class="w-7 h-7 bg-amber-50 rounded-lg flex items-center justify-center">
                    <i data-lucide="upload" class="w-4 h-4 text-amber-600"></i>
                </div>
                <h2 class="font-semibold text-stone-800 text-sm">上傳比對文件</h2>
            </div>
            <div class="p-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                    <!-- File A -->
                    <label for="file-a"
                        class="upload-card relative flex flex-col items-center justify-center gap-3 p-6 border-2 border-dashed border-stone-200 rounded-2xl bg-stone-50 cursor-pointer min-h-[140px]"
                        id="zone-a"
                        ondragover="handleDrag(event, 'a')"
                        ondragleave="handleDragLeave(event, 'a')"
                        ondrop="handleDrop(event, 'a')">
                        <input type="file" id="file-a" class="hidden" onchange="handleFileSelect('a')">
                        <div id="file-a-idle" class="flex flex-col items-center gap-2 text-center">
                            <div class="w-11 h-11 rounded-full bg-stone-100 flex items-center justify-center">
                                <i data-lucide="file-up" class="w-5 h-5 text-stone-400"></i>
                            </div>
                            <div>
                                <p class="text-sm font-semibold text-stone-600">文件 A</p>
                                <p class="text-xs text-stone-400 mt-0.5">拖放或點擊上傳</p>
                            </div>
                        </div>
                        <div id="file-a-selected" class="hidden flex flex-col items-center gap-2 text-center w-full">
                            <button type="button" onclick="event.preventDefault();event.stopPropagation();clearFile('a')"
                                class="absolute top-2 right-2 w-6 h-6 rounded-full bg-stone-200 hover:bg-red-100 text-stone-500 hover:text-red-600 flex items-center justify-center transition-colors">
                                <i data-lucide="x" class="w-3.5 h-3.5"></i>
                            </button>
                            <div class="w-11 h-11 rounded-full bg-amber-100 flex items-center justify-center" id="icon-a">
                                <i data-lucide="file-check" class="w-5 h-5 text-amber-600"></i>
                            </div>
                            <div class="w-full">
                                <p class="text-sm font-medium text-stone-700 truncate px-2" id="name-a"></p>
                                <p class="text-xs text-stone-400 mt-0.5" id="size-a"></p>
                            </div>
                        </div>
                    </label>

                    <!-- File B -->
                    <label for="file-b"
                        class="upload-card relative flex flex-col items-center justify-center gap-3 p-6 border-2 border-dashed border-stone-200 rounded-2xl bg-stone-50 cursor-pointer min-h-[140px]"
                        id="zone-b"
                        ondragover="handleDrag(event, 'b')"
                        ondragleave="handleDragLeave(event, 'b')"
                        ondrop="handleDrop(event, 'b')">
                        <input type="file" id="file-b" class="hidden" onchange="handleFileSelect('b')">
                        <div id="file-b-idle" class="flex flex-col items-center gap-2 text-center">
                            <div class="w-11 h-11 rounded-full bg-stone-100 flex items-center justify-center">
                                <i data-lucide="file-up" class="w-5 h-5 text-stone-400"></i>
                            </div>
                            <div>
                                <p class="text-sm font-semibold text-stone-600">文件 B</p>
                                <p class="text-xs text-stone-400 mt-0.5">拖放或點擊上傳</p>
                            </div>
                        </div>
                        <div id="file-b-selected" class="hidden flex flex-col items-center gap-2 text-center w-full">
                            <button type="button" onclick="event.preventDefault();event.stopPropagation();clearFile('b')"
                                class="absolute top-2 right-2 w-6 h-6 rounded-full bg-stone-200 hover:bg-red-100 text-stone-500 hover:text-red-600 flex items-center justify-center transition-colors">
                                <i data-lucide="x" class="w-3.5 h-3.5"></i>
                            </button>
                            <div class="w-11 h-11 rounded-full bg-amber-100 flex items-center justify-center" id="icon-b">
                                <i data-lucide="file-check" class="w-5 h-5 text-amber-600"></i>
                            </div>
                            <div class="w-full">
                                <p class="text-sm font-medium text-stone-700 truncate px-2" id="name-b"></p>
                                <p class="text-xs text-stone-400 mt-0.5" id="size-b"></p>
                            </div>
                        </div>
                    </label>

                </div>
            </div>
        </div>

        <!-- Prompt -->
        <div class="bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-stone-100 flex items-center gap-2.5">
                <div class="w-7 h-7 bg-amber-50 rounded-lg flex items-center justify-center">
                    <i data-lucide="message-square-text" class="w-4 h-4 text-amber-600"></i>
                </div>
                <h2 class="font-semibold text-stone-800 text-sm">審查指令</h2>
            </div>
            <div class="p-6 space-y-4">
                <!-- Preset Chips -->
                <div class="flex flex-wrap gap-2">
                    <span class="text-xs text-stone-400 self-center mr-1">快捷模板：</span>
                    <button onclick="setPreset('finance')"
                        class="px-3 py-1.5 bg-stone-100 hover:bg-amber-100 text-stone-600 hover:text-amber-700 rounded-full text-xs font-medium transition-colors">
                        💰 財務報表
                    </button>
                    <button onclick="setPreset('contract')"
                        class="px-3 py-1.5 bg-stone-100 hover:bg-amber-100 text-stone-600 hover:text-amber-700 rounded-full text-xs font-medium transition-colors">
                        📋 合同條款
                    </button>
                    <button onclick="setPreset('general')"
                        class="px-3 py-1.5 bg-stone-100 hover:bg-amber-100 text-stone-600 hover:text-amber-700 rounded-full text-xs font-medium transition-colors">
                        🔍 通用對比
                    </button>
                    <button onclick="setPreset('audit')"
                        class="px-3 py-1.5 bg-stone-100 hover:bg-amber-100 text-stone-600 hover:text-amber-700 rounded-full text-xs font-medium transition-colors">
                        🛡️ 風險審計
                    </button>
                </div>

                <textarea id="custom-prompt" rows="4"
                    class="w-full px-4 py-3 border border-stone-200 rounded-xl text-sm text-stone-700 bg-stone-50 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent focus:bg-white resize-none leading-relaxed transition-all"
                    placeholder="輸入審查指令，或選擇上方快捷模板…">請幫我交叉比對這兩份文件。如果是財務報表，請找出不匹配的數字與原因；如果是合同，請幫我找出條款上的文字差異、新增或刪除的福利、以及潛在的法律風險漏洞。</textarea>

                <button onclick="runCompare()" id="run-btn"
                    class="w-full bg-amber-600 hover:bg-amber-700 active:bg-amber-800 text-white font-semibold py-3.5 rounded-xl shadow-sm transition-all flex items-center justify-center gap-2 text-sm tracking-wide">
                    <i data-lucide="search" class="w-4 h-4"></i>
                    開始 AI 深度審查
                </button>
            </div>
        </div>

        <!-- Results -->
        <div id="result-zone" class="hidden">
            <div class="bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden">
                <div class="px-6 py-4 border-b border-stone-100 flex items-center justify-between flex-wrap gap-3">
                    <div class="flex items-center gap-2.5">
                        <div class="w-7 h-7 bg-emerald-50 rounded-lg flex items-center justify-center">
                            <i data-lucide="file-check-2" class="w-4 h-4 text-emerald-600"></i>
                        </div>
                        <h2 class="font-semibold text-stone-800 text-sm">審查報告</h2>
                    </div>
                    <div id="export-buttons" class="hidden gap-2 no-print">
                        <button onclick="copyReport()"
                            class="px-3.5 py-1.5 bg-stone-700 hover:bg-stone-800 text-white rounded-lg text-xs font-medium transition-colors flex items-center gap-1.5 shadow-sm">
                            <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                            複製
                        </button>
                        <button onclick="exportToExcel()"
                            class="px-3.5 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-xs font-medium transition-colors flex items-center gap-1.5 shadow-sm">
                            <i data-lucide="table-2" class="w-3.5 h-3.5"></i>
                            匯出 Excel
                        </button>
                        <button onclick="exportToPDF()"
                            class="px-3.5 py-1.5 bg-rose-600 hover:bg-rose-700 text-white rounded-lg text-xs font-medium transition-colors flex items-center gap-1.5 shadow-sm">
                            <i data-lucide="printer" class="w-3.5 h-3.5"></i>
                            匯出 PDF
                        </button>
                    </div>
                </div>
                <div class="p-6 md:p-8">
                    <div id="report-output" class="prose max-w-none"></div>
                </div>
            </div>
        </div>

        <!-- History -->
        <div id="history-zone" class="hidden bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-stone-100 flex items-center justify-between">
                <div class="flex items-center gap-2.5">
                    <div class="w-7 h-7 bg-amber-50 rounded-lg flex items-center justify-center">
                        <i data-lucide="history" class="w-4 h-4 text-amber-600"></i>
                    </div>
                    <h2 class="font-semibold text-stone-800 text-sm">審查歷史</h2>
                </div>
                <button onclick="clearHistory()" class="text-xs text-stone-400 hover:text-red-600 transition-colors flex items-center gap-1">
                    <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>清除
                </button>
            </div>
            <div id="history-list" class="divide-y divide-stone-100"></div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="mt-8 pb-10 text-center text-xs text-stone-400 no-print">
        <p>Diffy &mdash; AI 文件差異審查工具 &nbsp;·&nbsp; API Key 僅儲存於本地瀏覽器，文件內容不經過任何中間伺服器</p>
    </footer>

    <script>
        // ── Init ──────────────────────────────────────────────────────────────
        lucide.createIcons();
        pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        marked.setOptions({ breaks: true, gfm: true });

        function safeParse(text) {
            let html = marked.parse(text);
            // Strip script tags and event handlers from AI-generated output
            html = html
                .replace(/<script[\s\S]*?<\/script>/gi, '')
                .replace(/\son\w+\s*=\s*["'][^"']*["']/gi, '')
                .replace(/javascript:/gi, '');
            return html;
        }

        let currentModel = 'gemini';
        let reportText = '';
        const MAX_FILE_MB = 20;                 // 單檔大小上限
        const TOKEN_WARN = 120000;              // 估算 token 預警門檻
        const unsavedKeys = {};                 // 暫存各模型未儲存的輸入

        const MODEL_CONFIG = {
            gemini: {
                label: 'Gemini API Key',
                note: '支援 PDF、圖片原生分析；Excel、Word 自動轉換文字後送入',
                storageKey: 'diffy_gemini_key'
            },
            zhipu: {
                label: '智譜 API Key',
                note: '支援 Excel、Word、PDF（均提取文字後送入）；圖片格式暫不支援',
                storageKey: 'diffy_zhipu_key'
            }
        };

        const PRESETS = {
            finance: '請幫我深度交叉比對這兩份財務報表，重點找出：\n1. 數字不一致之處及金額差異（請列出具體科目及金額）\n2. 科目分類的變化\n3. 異常數值或不合理波動\n4. 可能的錯誤或風險跡象\n\n請以表格形式呈現主要差異，並附上說明。',
            contract: '請幫我精細比對這兩份合同的條款差異，重點找出：\n1. 新增或刪除的條款（請標明條款編號）\n2. 關鍵條件的文字修改（逐字對比原文）\n3. 關鍵金額變化及財務影響（如付款期限、費率、金額等數字異動，並分析對雙方現金流的實際影響）\n4. 責任義務的調整\n5. 潛在的法律風險或不利條款\n\n請標明每項差異的重要程度（高／中／低），並說明對甲乙雙方各自的利弊。',
            general: '請幫我全面比對這兩份文件的所有差異，包括：\n1. 文字內容的新增、刪除或修改\n2. 數字或資料的變動\n3. 結構與格式的差異\n4. 差異的重要程度分析\n\n請條列式呈現，並說明每項差異的潛在影響。',
            audit: '請以專業審計師的角度，深度審查這兩份文件，重點評估：\n1. 資料一致性與準確性\n2. 潛在的不合規或風險事項\n3. 資訊缺漏或模糊之處\n4. 需要進一步查核的疑點\n5. 整體風險評級及建議\n\n請以條列式逐項呈現，每項標明風險等級（高／中／低）及建議處理方式。'
        };

        // ── Model Selection ───────────────────────────────────────────────────
        function selectModel(model) {
            // 切換前先暫存目前輸入框中未儲存的 Key
            const prevInput = document.getElementById('api-key');
            if (prevInput && currentModel) {
                const cur = prevInput.value.trim();
                if (cur && cur !== (localStorage.getItem(MODEL_CONFIG[currentModel].storageKey) || '')) {
                    unsavedKeys[currentModel] = cur;
                }
            }

            currentModel = model;
            const cfg = MODEL_CONFIG[model];

            // Update buttons
            document.querySelectorAll('.model-btn').forEach(btn => {

        // ── Preset Prompts ────────────────────────────────────────────────────
        function setPreset(type) {

        // ── File Handling ─────────────────────────────────────────────────────
        function handleDrag(e, slot) {
            e.preventDefault();
            e.stopPropagation();
            document.getElementById(`zone-${slot}`).classList.add('drag-active');
        }

        function handleDragLeave(e, slot) {
            e.preventDefault();
            if (!e.currentTarget.contains(e.relatedTarget)) {
                document.getElementById(`zone-${slot}`).classList.remove('drag-active');
            }
        }

        function handleDrop(e, slot) {
            e.preventDefault();
            e.stopPropagation();
            document.getElementById(`zone-${slot}`).classList.remove('drag-active');
            const file = e.dataTransfer?.files?.[0];
            if (!file) return;
            if (!validateFile(file)) return;
            // Assign to hidden input (read-only, so we store it)
            window[`droppedFile${slot.toUpperCase()}`] = file;
            showFileSelected(slot, file);
        }

        function handleFileSelect(slot) {
            const file = document.getElementById(`file-${slot}`).files[0];
            if (file) {
                if (!validateFile(file)) { document.getElementById(`file-${slot}`).value = ''; return; }
                window[`droppedFile${slot.toUpperCase()}`] = null;
                showFileSelected(slot, file);
            }
        }

        // 上傳即時檢查：大小上限 + 智譜不支援圖片
        function validateFile(file) {
            if (file.size > MAX_FILE_MB * 1048576) {
                showToast(`檔案過大（上限 ${MAX_FILE_MB}MB）：${file.name}`, 'error');
                return false;
            }
            if (currentModel === 'zhipu' && file.type.includes('image')) {
                showToast('智譜模型暫不支援圖片，請改用 Gemini', 'error');
                return false;
            }
            return true;
        }

        // 移除已選檔案
        function clearFile(slot) {
            window[`droppedFile${slot.toUpperCase()}`] = null;
            document.getElementById(`file-${slot}`).value = '';
            document.getElementById(`file-${slot}-selected`).classList.add('hidden');
            document.getElementById(`file-${slot}-idle`).classList.remove('hidden');
        }

        function getFile(slot) {
            const dropped = window[`droppedFile${slot.toUpperCase()}`];
            const input = document.getElementById(`file-${slot}`).files[0];
            return dropped || input || null;
        }

        function getFileIconName(file) {
            const t = file.type;
            const n = file.name.toLowerCase();
            if (t.includes('pdf')) return 'file-type-2';
            if (t.includes('sheet') || t.includes('excel') || n.match(/\.xlsx?$/)) return 'table-2';
            if (t.includes('wordprocessing') || n.match(/\.docx?$/)) return 'file-text';
            if (t.includes('image')) return 'image';
            return 'file-text';
        }

        function formatBytes(b) {
            if (b < 1024) return b + ' B';
            if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
            return (b / 1048576).toFixed(1) + ' MB';
        }

        function showFileSelected(slot, file) {
            document.getElementById(`file-${slot}-idle`).classList.add('hidden');
            const sel = document.getElementById(`file-${slot}-selected`);
            sel.classList.remove('hidden');
            document.getElementById(`name-${slot}`).textContent = file.name;
            document.getElementById(`size-${slot}`).textContent = formatBytes(file.size);
            const iconEl = document.getElementById(`icon-${slot}`);
            iconEl.innerHTML = `<i data-lucide="${getFileIconName(file)}" class="w-5 h-5 text-amber-600"></i>`;
            lucide.createIcons();
        }

        // ── File Content Extraction ───────────────────────────────────────────
        const toBase64 = (file) => new Promise((resolve, reject) => {
            const r = new FileReader();
            r.onload = () => resolve({ mimeType: file.type || 'application/octet-stream', base64: r.result.split(',')[1], name: file.name });
            r.onerror = () => reject(new Error(`檔案讀取失敗（${file.name}）`));
            r.readAsDataURL(file);
        });

        const toText = (file) => new Promise((resolve, reject) => {
            const r = new FileReader();
            r.onload = e => resolve(e.target.result);
            r.onerror = () => reject(new Error(`檔案讀取失敗（${file.name}）`));
            r.readAsText(file, 'UTF-8');
        });

        async function excelToText(file) {
            return new Promise((resolve, reject) => {
                const r = new FileReader();
                r.onload = e => {
                    try {
                        const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                        let out = '';
                        wb.SheetNames.forEach(name => {
                            out += `\n[工作表: ${name}]\n`;
                            out += XLSX.utils.sheet_to_csv(wb.Sheets[name]);
                            out += '\n';
                        });
                        resolve(out.trim());
                    } catch {
                        reject(new Error(`Excel 解析失敗（${file.name}），請確認檔案格式正確`));
                    }
                };
                r.onerror = () => reject(new Error(`檔案讀取失敗（${file.name}）`));
                r.readAsArrayBuffer(file);
            });
        }

        // HTML → Markdown（含表格），忽略內嵌圖片以避免 base64 灌爆文字
        function htmlToMarkdown(html) {
            const td = new TurndownService({ headingStyle: 'atx', hr: '---' });
            if (window.turndownPluginGfm) td.use(window.turndownPluginGfm.gfm);
            td.remove('img');
            return td.turndown(html);
        }

        async function docxToText(file) {
            try {
                const buf = await file.arrayBuffer();
                // 轉 HTML（保留標題/表格/清單結構），忽略圖片本體
                const result = await mammoth.convertToHtml(
                    { arrayBuffer: buf },
                    { convertImage: mammoth.images.imgElement(() => Promise.resolve({})) }
                );
                return htmlToMarkdown(result.value).trim();
            } catch {
                throw new Error(`Word 文件解析失敗（${file.name}），請確認文件格式正確`);
            }
        }

        // 按 Y 座標分行、按 X 間距偵測欄位邊界，盡量還原表格排版
        function reconstructPdfLayout(items) {
            if (!items.length) return '';
            const Y_TOLERANCE = 3;
            const COLUMN_GAP = 12;

            const sorted = [...items].sort((a, b) => b.transform[5] - a.transform[5]);
            const lines = [];
            let line = [];
            let lineY = null;
            for (const it of sorted) {
                const y = it.transform[5];
                if (lineY === null || Math.abs(y - lineY) <= Y_TOLERANCE) {
                    line.push(it);
                    lineY = lineY === null ? y : lineY;
                } else {
                    lines.push(line);
                    line = [it];
                    lineY = y;
                }
            }
            if (line.length) lines.push(line);

            return lines.map(items => {
                items.sort((a, b) => a.transform[4] - b.transform[4]);
                let out = '';
                let lastEndX = null;
                for (const it of items) {
                    const x = it.transform[4];
                    if (lastEndX !== null) {
                        const gap = x - lastEndX;
                        out += gap > COLUMN_GAP ? ' | ' : (gap > 1 ? ' ' : '');
                    }
                    out += it.str;
                    lastEndX = x + (it.width || it.str.length * 5);
                }
                return out;
            }).join('\n');
        }

        async function pdfToText(file) {
            try {
                const buf = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
                let text = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += `\n[第 ${i} 頁]\n` + reconstructPdfLayout(content.items) + '\n';
                }
                return text.trim();
            } catch (e) {
                throw new Error(`PDF 解析失敗（${file.name}）：${e.message || '請確認文件未加密或損壞'}`);
            }
        }

        async function fileToText(file) {
            const t = file.type;
            const n = file.name.toLowerCase();
            if (t.includes('sheet') || t.includes('excel') || n.endsWith('.xlsx') || n.endsWith('.xls')) {
                return excelToText(file);
            }
            if (t.includes('wordprocessing') || n.endsWith('.docx') || n.endsWith('.doc')) {
                return docxToText(file);
            }
            if (t.includes('pdf')) return pdfToText(file);
            return toText(file);
        }

        // Gemini 原生支援的 MIME 類型（其餘需轉為文字再送入）
        function isGeminiNative(file) {
            const t = file.type;
            const n = file.name.toLowerCase();
            if (t.includes('image')) return true;
            if (t.includes('pdf')) return true;
            if (t.startsWith('text/')) return true;
            if (t.includes('audio') || t.includes('video')) return true;
            // xlsx, docx, doc, xls 均不支援
            return false;
        }

        // ── API Calls ─────────────────────────────────────────────────────────
        async function filePartForGemini(file) {
            if (isGeminiNative(file)) {
                const d = await toBase64(file);
                return [
                    { text: `[文件：${file.name}]` },
                    { inlineData: { mimeType: d.mimeType, data: d.base64 } }
                ];
            }
            // 不支援的格式先提取文字
            const text = await fileToText(file);
            return [{ text: `[文件：${file.name}（已轉換為文字）]\n${text}` }];
        }

        // 帶逾時的 fetch（預設 120 秒）
        async function fetchWithTimeout(url, opts, ms = 120000) {
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), ms);
            try {
                return await fetch(url, { ...opts, signal: ctrl.signal });
            } catch (e) {
                if (e.name === 'AbortError') throw new Error(`請求逾時（超過 ${ms / 1000} 秒），請改用較小的文件或稍後再試`);
                throw new Error('網路連線失敗，請檢查網路後再試');
            } finally {
                clearTimeout(timer);
            }
        }

        async function callGemini(apiKey, fileA, fileB, prompt) {
            const [partsA, partsB] = await Promise.all([
                filePartForGemini(fileA),
                filePartForGemini(fileB)
            ]);
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            const body = {
                contents: [{
                    parts: [
                        { text: `以下是文件 A（${fileA.name}）：` },
                        ...partsA,
                        { text: `以下是文件 B（${fileB.name}）：` },
                        ...partsB,
                        { text: `${prompt}\n\n請用繁體中文回答，條列式、層次分明地呈現所有差異點與專業分析。` }
                    ]
                }]
            };
            const res = await fetchWithTimeout(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            const json = await res.json();
            if (json.error) throw new Error(`Gemini 錯誤：${json.error.message}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);

            const cand = json.candidates?.[0];
            if (!cand) {
                const blk = json.promptFeedback?.blockReason;
                throw new Error(blk ? `內容被 Gemini 安全機制攔截（${blk}）` : 'Gemini 未回傳任何結果，請稍後再試');
            }
            if (cand.finishReason && cand.finishReason !== 'STOP') {
                const reasons = { SAFETY: '內容觸發安全機制', MAX_TOKENS: '回應超出長度上限（文件過大）', RECITATION: '內容疑似重複受版權保護的資料' };
                throw new Error(`Gemini 中止回應：${reasons[cand.finishReason] || cand.finishReason}`);
            }
            const text = cand.content?.parts?.[0]?.text;
            if (!text) throw new Error('Gemini 回傳內容為空，請稍後再試');
            return text;
        }

        async function callZhipu(apiKey, fileA, fileB, prompt, retry = true) {
            const [tA, tB] = await Promise.all([fileToText(fileA), fileToText(fileB)]);
            const url = 'https://open.bigmodel.cn/api/paas/v4/chat/completions';
            const body = {
                model: 'glm-4-flash',
                messages: [{
                    role: 'user',
                    content: `請比對以下兩份文件並進行深度審查分析。\n\n【文件 A：${fileA.name}】\n${tA}\n\n【文件 B：${fileB.name}】\n${tB}\n\n${prompt}\n\n請用繁體中文回答，條列式、層次分明地呈現所有差異點與專業分析。`
                }]
            };
            const res = await fetchWithTimeout(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify(body)
            });
            const json = await res.json();
            // 503 / overloaded：自動重試一次
            if ((res.status === 503 || json.error?.message?.includes('overloaded')) && retry) {
                await new Promise(r => setTimeout(r, 3000));
                return callZhipu(apiKey, fileA, fileB, prompt, false);
            }
            if (json.error) {
                const msg = json.error.message || '';
                if (msg.includes('overloaded') || msg.includes('temporarily')) {
                    throw new Error('智譜伺服器目前繁忙，請稍後再試（約 1–2 分鐘後重新提交）');
                }
                throw new Error(`智譜 API 錯誤：${msg}`);
            }
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const content = json.choices?.[0]?.message?.content;
            if (!content) throw new Error('智譜回傳內容為空，請稍後再試');
            return content;
        }

        // ── Main Comparison ───────────────────────────────────────────────────
        async function runCompare() {
            const apiKey = document.getElementById('api-key').value.trim();
            const fileA = getFile('a');
            const fileB = getFile('b');
            const prompt = document.getElementById('custom-prompt').value.trim();

            if (!apiKey) return showToast('請先輸入並儲存 API Key', 'error');
            if (!fileA || !fileB) return showToast('請上傳文件 A 和文件 B', 'error');

            // 粗略 token 估算（UTF-8 位元組約 3 bytes/CJK 字，再 ÷ 比值）預警
            const estTokens = Math.round((fileA.size + fileB.size) / 3);
            if (estTokens > TOKEN_WARN) {
                const ok = confirm(`預估內容約 ${estTokens.toLocaleString()} tokens，可能超出模型上限導致截斷或失敗。\n仍要繼續嗎？`);
                if (!ok) return;
            }

            // UI: loading state
            const resultZone = document.getElementById('result-zone');
            const outputBox = document.getElementById('report-output');
            const exportBtns = document.getElementById('export-buttons');
            const runBtn = document.getElementById('run-btn');

            resultZone.classList.remove('hidden');
            exportBtns.style.display = 'none';
            runBtn.disabled = true;
            runBtn.innerHTML = `<div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div><span>AI 深度分析中…</span>`;

            outputBox.innerHTML = `
                <div class="flex flex-col items-center justify-center py-12 gap-4 text-center">
                    <div class="w-10 h-10 border-2 border-amber-400 border-t-transparent rounded-full animate-spin"></div>
                    <div>
                        <p class="text-sm font-medium text-stone-600">AI 正在閱讀並分析兩份文件</p>
                        <p class="text-xs text-stone-400 mt-1">逐字、逐句、逐額深度審查中，請稍候…</p>
                    </div>
                </div>
            `;
            resultZone.scrollIntoView({ behavior: 'smooth', block: 'start' });

            try {
                const text = currentModel === 'gemini'
                    ? await callGemini(apiKey, fileA, fileB, prompt)
                    : await callZhipu(apiKey, fileA, fileB, prompt);

                reportText = text;
                outputBox.innerHTML = safeParse(text);
                exportBtns.style.display = 'flex';
                saveToHistory(fileA.name, fileB.name, text);
                lucide.createIcons();

            } catch (err) {
                outputBox.innerHTML = `
                    <div class="flex items-start gap-3 p-4 bg-red-50 rounded-xl border border-red-100">
                        <i data-lucide="alert-circle" class="w-5 h-5 text-red-500 flex-shrink-0 mt-0.5"></i>
                        <div>
                            <p class="text-sm font-semibold text-red-700">審查失敗</p>
                            <p class="text-sm text-red-600 mt-1">${escapeHtml(err.message)}</p>
                            <p class="text-xs text-red-400 mt-2">請確認 API Key 是否正確，以及所選模型是否支援該文件格式。</p>
                        </div>
                    </div>
                `;
                lucide.createIcons();
            } finally {
                runBtn.disabled = false;
                runBtn.innerHTML = `<i data-lucide="search" class="w-4 h-4"></i>開始 AI 深度審查`;
                lucide.createIcons();
            }
        }

        // ── Export ────────────────────────────────────────────────────────────
        function exportToExcel() {
            if (!reportText) return;
            const lines = reportText.split('\n');
            const rows = [
                ['Diffy AI 審查報告'],
                [`生成時間：${new Date().toLocaleString('zh-TW')}`],
                [`使用模型：${currentModel === 'gemini' ? 'Gemini 2.5 Flash' : 'GLM-4-Flash (智譜)'}`],
                []
            ];

            lines.forEach(line => {
                const clean = line.replace(/\*\*/g, '').replace(/\*/g, '').replace(/^#+\s*/, '').trim();
                if (!clean) { rows.push([]); return; }
                if (/^#{1,3}\s/.test(line)) {
                    rows.push([clean]);
                } else if (/^[-*+]\s/.test(line) || /^\d+\.\s/.test(line)) {
                    rows.push(['', clean.replace(/^[-*+\d.]\s*/, '')]);
                } else {
                    rows.push([clean]);
                }
            });

            const ws = XLSX.utils.aoa_to_sheet(rows);
            ws['!cols'] = [{ wch: 35 }, { wch: 90 }];

            // Style header rows
            ['A1', 'A2', 'A3'].forEach(ref => {
                if (ws[ref]) ws[ref].s = { font: { bold: true } };
            });

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '審查報告');
            XLSX.writeFile(wb, `Diffy_Report_${new Date().toISOString().slice(0, 10)}.xlsx`);
        }

        // ── Utils ─────────────────────────────────────────────────────────────
        function escapeHtml(str) {
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function showToast(msg, type = 'info') {
            document.getElementById('toast')?.remove();
            const colors = { success: 'bg-emerald-700', error: 'bg-red-700', info: 'bg-stone-800' };
            const t = document.createElement('div');
            t.id = 'toast';
            t.className = `fixed bottom-6 right-4 md:right-6 ${colors[type]} text-white px-4 py-2.5 rounded-xl shadow-lg text-sm font-medium z-50 flex items-center gap-2 max-w-xs`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
        }

        // ── Copy Report ───────────────────────────────────────────────────────
        async function copyReport() {
            if (!reportText) return;
            try {
                await navigator.clipboard.writeText(reportText);
                showToast('報告已複製到剪貼板', 'success');
            } catch {
                showToast('複製失敗，請手動選取', 'error');
            }
        }

        // ── History（localStorage 存最近 5 次）────────────────────────────────
        const HISTORY_KEY = 'diffy_history';

        function loadHistory() {
            try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
            catch { return []; }
        }

        function saveToHistory(nameA, nameB, text) {
            const list = loadHistory();
            list.unshift({
                id: Date.now(),
                model: currentModel === 'gemini' ? 'Gemini 2.5 Flash' : 'GLM-4-Flash',
                files: `${nameA} ↔ ${nameB}`,
                time: new Date().toLocaleString('zh-TW'),
                text
            });
            try { localStorage.setItem(HISTORY_KEY, JSON.stringify(list.slice(0, 5))); } catch {}
            renderHistory();
        }

        function renderHistory() {
            const list = loadHistory();
            const zone = document.getElementById('history-zone');
            const box = document.getElementById('history-list');
            if (!list.length) { zone.classList.add('hidden'); return; }
            zone.classList.remove('hidden');
            box.innerHTML = list.map(h => `
                <button onclick="viewHistory(${h.id})" class="w-full text-left px-6 py-3.5 hover:bg-stone-50 transition-colors flex items-center justify-between gap-3 group">
                    <div class="min-w-0">
                        <p class="text-sm font-medium text-stone-700 truncate">${escapeHtml(h.files)}</p>
                        <p class="text-xs text-stone-400 mt-0.5">${escapeHtml(h.model)} · ${escapeHtml(h.time)}</p>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-stone-300 group-hover:text-amber-500 flex-shrink-0"></i>
                </button>`).join('');
            lucide.createIcons();
        }

        function viewHistory(id) {
            const item = loadHistory().find(h => h.id === id);
            if (!item) return;
            reportText = item.text;
            document.getElementById('result-zone').classList.remove('hidden');
            document.getElementById('report-output').innerHTML = safeParse(item.text);
            document.getElementById('export-buttons').style.display = 'flex';
            lucide.createIcons();
            document.getElementById('result-zone').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function clearHistory() {
            if (!confirm('確定要清除所有審查歷史嗎？')) return;
            localStorage.removeItem(HISTORY_KEY);
            renderHistory();
        }

        // ── Boot ──────────────────────────────────────────────────────────────
        selectModel('gemini');
        renderHistory();
    </script>
</body>
</html>
